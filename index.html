<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조이고 뉴스 - JoyGO News</title>
    <style>
        /* 기본 설정 및 폰트 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        :root {
            --joygo-blue: #6166fb;
            --bg-light: #f4f6f9;
            --text-main: #1a1a1a;
            --text-muted: #999;
            --border: #e1e4e8;
            --like-red: #ff4d4d;
            --dislike-blue: #4d79ff;
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            color: var(--text-main);
            background-color: #fff;
            line-height: 1.5;
        }

        ul { margin: 0; padding: 0; list-style: none; }
        a { text-decoration: none; color: inherit; }

        .top-accent-bar {
            height: 10px;
            background-color: var(--joygo-blue);
            width: 100%;
        }

        header {
            padding: 20px 10%;
            border-bottom: 1px solid var(--border);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo img {
            height: 45px;
            display: block;
            cursor: pointer;
        }

        .header-tools {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .date-display { font-size: 13px; font-weight: bold; color: #444; }
        .weather-display { font-size: 13px; color: #666; display: flex; align-items: center; gap: 5px; }
        .weather-icon { width: 24px; height: 24px; }

        .auth-container { display: flex; align-items: center; gap: 10px; }
        .login-btn {
            background-color: var(--joygo-blue);
            color: white; border: none; padding: 8px 16px;
            border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        .user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .user-photo { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); }

        nav ul { display: flex; gap: 30px; }
        nav ul li a { font-size: 17px; font-weight: 800; padding-bottom: 8px; cursor: pointer; }
        nav ul li a.active { color: var(--joygo-blue); border-bottom: 3px solid var(--joygo-blue); }

        main { padding: 40px 10%; max-width: 1200px; margin: 0 auto; min-height: 70vh; }

        /* 뉴스 리스트 뷰 */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .news-item {
            border: 1px solid #eee; border-radius: 12px; overflow: hidden;
            transition: transform 0.2s; background: white; cursor: pointer;
        }
        .news-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; pointer-events: none; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .news-content-area { padding: 20px; }
        .news-content-area h3 { margin: 0 0 10px 0; font-size: 18px; line-height: 1.4; }
        .news-content-area p { font-size: 14px; color: #555; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 상세 페이지 뷰 */
        #detailView { display: none; }
        .back-btn { margin-bottom: 20px; background: none; border: 1px solid var(--border); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .detail-header h1 { font-size: 28px; margin-bottom: 10px; }
        .detail-meta { color: #888; font-size: 14px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .detail-video { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 30px; border-radius: 10px; overflow: hidden; }
        .detail-content { font-size: 17px; line-height: 1.8; color: #333; white-space: pre-wrap; margin-bottom: 50px; }

        /* 댓글 섹션 */
        .comment-section { border-top: 2px solid #eee; padding-top: 40px; margin-bottom: 100px; }
        .comment-header { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        .comment-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        .comment-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 15px; box-sizing: border-box; font-family: inherit; resize: none; background: #fff; }
        .comment-submit { align-self: flex-end; background: var(--joygo-blue); color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .comment-list { display: flex; flex-direction: column; gap: 20px; }
        .comment-item { display: flex; flex-direction: column; gap: 10px; padding-bottom: 15px; border-bottom: 1px solid #f5f5f5; }
        .comment-main { display: flex; gap: 15px; }
        .comment-user-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .comment-body { flex: 1; }
        .comment-user-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .comment-text { font-size: 15px; color: #444; word-break: break-all; }
        .comment-date { font-size: 12px; color: #999; margin-top: 5px; }

        /* 댓글 액션 버튼들 */
        .comment-actions { display: flex; gap: 15px; margin-top: 10px; align-items: center; }
        .action-btn { background: none; border: none; font-size: 12px; color: #777; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 0; }
        .action-btn:hover { text-decoration: underline; }
        .action-btn.like:hover { color: var(--like-red); }
        .action-btn.dislike:hover { color: var(--dislike-blue); }
        .action-btn.report:hover { color: #f39c12; }
        .action-btn.edit:hover, .action-btn.delete:hover { color: var(--joygo-blue); }

        /* 대댓글 스타일 */
        .reply-list { margin-left: 55px; margin-top: 15px; border-left: 2px solid #eee; padding-left: 15px; display: flex; flex-direction: column; gap: 15px; }
        .reply-form { margin-left: 55px; margin-top: 10px; display: none; }
        .reply-form.active { display: block; }

        /* 수정 폼 스타일 */
        .edit-form { display: none; margin-top: 10px; }
        .edit-form.active { display: block; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 50px; z-index: 2000; display: none; }

        @media (max-width: 768px) {
            main { padding: 20px 5%; }
            .detail-header h1 { font-size: 22px; }
            .reply-list { margin-left: 20px; }
        }
    </style>
</head>
<body>

    <div class="top-accent-bar"></div>

    <header>
        <div class="header-main">
            <div class="logo" onclick="showListView()">
                <img src="https://i.postimg.cc/PrK5Ysh4/joygo-logo-qenyzfo8a6cul319bqetl2et0yfhgwizrrfan2szcw.png" alt="JoyGO News Logo">
            </div>
            <div class="header-tools">
                <div class="info-wrap">
                    <div class="date-display" id="realTimeDate"></div>
                    <div class="weather-display" id="weatherDisplay">로딩 중...</div>
                </div>
                <div class="auth-container" id="authContainer">
                    <button class="login-btn" id="loginBtn">로그인</button>
                </div>
            </div>
        </div>
        <nav>
            <ul>
                <li><a onclick="showListView()" id="navHome" class="active">홈</a></li>
                <li><a href="https://www.joygonews.uk/jebo" target="_blank">제보</a></li>
                <li><a href="https://www.joygonews.uk/weather" target="_blank">날씨</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 뉴스 리스트 화면 -->
        <section id="listView">
            <h2 style="margin-bottom:30px; border-left:6px solid var(--joygo-blue); padding-left:15px;">최신 뉴스 피드</h2>
            <div class="news-grid" id="newsGrid">
                <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">뉴스를 불러오고 있습니다...</div>
            </div>
        </section>

        <!-- 뉴스 상세 화면 -->
        <section id="detailView">
            <button class="back-btn" onclick="showListView()">← 목록으로</button>
            <div id="detailContentArea"></div>
            
            <div class="comment-section">
                <div class="comment-header">댓글 <span id="commentCount">0</span></div>
                <div class="comment-form">
                    <textarea class="comment-input" id="commentInput" placeholder="비방이나 욕설은 제재 대상이 될 수 있습니다. 댓글을 남겨주세요." rows="3"></textarea>
                    <button class="comment-submit" onclick="window.submitComment()">등록</button>
                </div>
                <div class="comment-list" id="commentList"></div>
            </div>
        </section>
    </main>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, orderBy, serverTimestamp, onSnapshot, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDOu8jfgNproVHenknRdsG-HPScyFMdO0k",
            authDomain: "joygonews318.firebaseapp.com",
            projectId: "joygonews318",
            storageBucket: "joygonews318.firebasestorage.app",
            messagingSenderId: "18066193272",
            appId: "1:18066193272:web:8a5e0e8e8a82d3e870e68d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentNewsId = null;
        let unsubscribeComments = null;

        // 화면 전환 함수
        window.showListView = () => {
            document.getElementById('listView').style.display = 'block';
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('navHome').classList.add('active');
            currentNewsId = null;
            if (unsubscribeComments) unsubscribeComments();
        };

        window.showDetailView = async (newsId) => {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';
            document.getElementById('navHome').classList.remove('active');
            currentNewsId = newsId;
            window.scrollTo(0, 0);

            const detailArea = document.getElementById('detailContentArea');
            detailArea.innerHTML = '<p style="text-align:center; padding:50px;">내용을 불러오는 중...</p>';

            try {
                const docRef = doc(db, "news", newsId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : '방금 전';
                    
                    detailArea.innerHTML = `
                        <div class="detail-header">
                            <h1>${data.title}</h1>
                            <div class="detail-meta">
                                <strong>${data.author || '익명'}</strong> | ${date}
                            </div>
                        </div>
                        <div class="detail-video">
                            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${data.youtubeId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                        <div class="detail-content">${data.content}</div>
                    `;
                    loadComments(newsId);
                }
            } catch (e) {
                detailArea.innerHTML = '<p>데이터를 불러오는 중 오류가 발생했습니다.</p>';
            }
        };

        // 뉴스 로드
        window.loadNews = async () => {
            const newsGrid = document.getElementById('newsGrid');
            try {
                const q = query(collection(db, "news"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    newsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">등록된 뉴스가 없습니다.</div>';
                    return;
                }

                newsGrid.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : '방금 전';
                    
                    const item = document.createElement('article');
                    item.className = 'news-item';
                    item.onclick = () => window.showDetailView(doc.id);
                    item.innerHTML = `
                        <div class="video-wrapper">
                            <iframe src="https://www.youtube.com/embed/${data.youtubeId}?controls=0" frameborder="0"></iframe>
                        </div>
                        <div class="news-content-area">
                            <h3>${data.title}</h3>
                            <p>${data.content}</p>
                            <div style="font-size:12px; color:#999; margin-top:10px;">
                                <strong>${data.author || '익명'}</strong> · ${date}
                            </div>
                        </div>
                    `;
                    newsGrid.appendChild(item);
                });
            } catch (e) {
                console.error(e);
            }
        };

        // 실시간 댓글 및 대댓글 로드
        const loadComments = (newsId) => {
            const commentList = document.getElementById('commentList');
            const commentCount = document.getElementById('commentCount');
            
            const q = query(collection(db, "news", newsId, "comments"), orderBy("createdAt", "asc")); // 오래된 순으로 정렬해야 대댓글 흐름이 자연스러움
            
            unsubscribeComments = onSnapshot(q, (snapshot) => {
                commentCount.innerText = snapshot.size;
                commentList.innerHTML = '';
                
                if (snapshot.empty) {
                    commentList.innerHTML = '<p style="color:#999; text-align:center; padding:20px;">아직 댓글이 없습니다. 첫 의견을 남겨보세요!</p>';
                    return;
                }

                const commentsMap = {};
                const topLevelComments = [];

                snapshot.forEach((doc) => {
                    const data = { id: doc.id, ...doc.data(), replies: [] };
                    commentsMap[doc.id] = data;
                    if (data.parentId) {
                        if (commentsMap[data.parentId]) {
                            commentsMap[data.parentId].replies.push(data);
                        }
                    } else {
                        topLevelComments.push(data);
                    }
                });

                // 상단 댓글부터 렌더링 (최근 순으로 보여주기 위해 뒤집기)
                topLevelComments.reverse().forEach(comment => {
                    renderCommentItem(comment, commentList, false);
                });
            });
        };

        // 댓글 아이템 렌더링 함수
        function renderCommentItem(comment, container, isReply) {
            const date = comment.createdAt ? new Date(comment.createdAt.seconds * 1000).toLocaleString() : '방금 전';
            const isMyComment = auth.currentUser && auth.currentUser.uid === comment.uid;

            const itemDiv = document.createElement('div');
            itemDiv.className = isReply ? 'reply-item' : 'comment-item';
            itemDiv.innerHTML = `
                <div class="comment-main">
                    <img src="${comment.userPhoto || 'https://via.placeholder.com/40'}" class="comment-user-img">
                    <div class="comment-body">
                        <div class="comment-user-name">
                            ${comment.userName}
                            ${isMyComment ? '<span style="font-size:10px; color:var(--joygo-blue); background:#eef0ff; padding:2px 6px; border-radius:10px;">내 댓글</span>' : ''}
                        </div>
                        <div id="text-${comment.id}" class="comment-text">${comment.text}</div>
                        
                        <!-- 수정 폼 -->
                        <div id="edit-form-${comment.id}" class="edit-form">
                            <textarea id="edit-input-${comment.id}" class="comment-input" rows="2">${comment.text}</textarea>
                            <div style="text-align:right; margin-top:5px;">
                                <button onclick="window.cancelEdit('${comment.id}')" style="background:#eee; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">취소</button>
                                <button onclick="window.updateComment('${comment.id}')" style="background:var(--joygo-blue); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">수정완료</button>
                            </div>
                        </div>

                        <div class="comment-date">${date}</div>
                        <div class="comment-actions">
                            <button class="action-btn like" onclick="window.handleReaction('${comment.id}', 'likes')">👍 ${comment.likes || 0}</button>
                            <button class="action-btn dislike" onclick="window.handleReaction('${comment.id}', 'dislikes')">👎 ${comment.dislikes || 0}</button>
                            ${!isReply ? `<button class="action-btn" onclick="window.toggleReplyForm('${comment.id}')">답글</button>` : ''}
                            ${isMyComment ? `
                                <button class="action-btn edit" onclick="window.toggleEditForm('${comment.id}')">수정</button>
                                <button class="action-btn delete" onclick="window.deleteComment('${comment.id}')">삭제</button>
                            ` : `
                                <button class="action-btn report" onclick="window.reportComment('${comment.id}')">신고</button>
                            `}
                        </div>
                    </div>
                </div>
                ${!isReply ? `
                    <div id="reply-form-${comment.id}" class="reply-form">
                        <textarea id="reply-input-${comment.id}" class="comment-input" placeholder="답글을 입력하세요..." rows="2"></textarea>
                        <div style="text-align:right; margin-top:5px;">
                            <button class="comment-submit" style="padding:5px 15px; font-size:12px;" onclick="window.submitComment('${comment.id}')">답글 등록</button>
                        </div>
                    </div>
                    <div class="reply-list" id="replies-${comment.id}"></div>
                ` : ''}
            `;
            container.appendChild(itemDiv);

            // 대댓글이 있는 경우 재귀 호출
            if (comment.replies && comment.replies.length > 0) {
                const replyContainer = itemDiv.querySelector(`#replies-${comment.id}`);
                comment.replies.forEach(reply => {
                    renderCommentItem(reply, replyContainer, true);
                });
            }
        }

        // --- 기능 함수들 ---

        // 댓글 등록 (parentId가 있으면 대댓글)
        window.submitComment = async (parentId = null) => {
            if (!auth.currentUser) return showToast("로그인 후 이용 가능합니다.");
            
            const inputId = parentId ? `reply-input-${parentId}` : 'commentInput';
            const input = document.getElementById(inputId);
            const text = input.value.trim();
            if (!text) return;

            try {
                await addDoc(collection(db, "news", currentNewsId, "comments"), {
                    text: text,
                    uid: auth.currentUser.uid,
                    userName: auth.currentUser.displayName,
                    userPhoto: auth.currentUser.photoURL,
                    createdAt: serverTimestamp(),
                    parentId: parentId,
                    likes: 0,
                    dislikes: 0
                });
                input.value = '';
                if (parentId) document.getElementById(`reply-form-${parentId}`).classList.remove('active');
                showToast(parentId ? "답글이 등록되었습니다." : "댓글이 등록되었습니다.");
            } catch (e) {
                showToast("등록 실패");
            }
        };

        // 수정 폼 토글
        window.toggleEditForm = (id) => {
            document.getElementById(`text-${id}`).style.display = 'none';
            document.getElementById(`edit-form-${id}`).classList.add('active');
        };

        window.cancelEdit = (id) => {
            document.getElementById(`text-${id}`).style.display = 'block';
            document.getElementById(`edit-form-${id}`).classList.remove('active');
        };

        // 댓글 수정
        window.updateComment = async (id) => {
            const text = document.getElementById(`edit-input-${id}`).value.trim();
            if (!text) return;
            try {
                await updateDoc(doc(db, "news", currentNewsId, "comments", id), {
                    text: text,
                    updatedAt: serverTimestamp()
                });
                showToast("수정되었습니다.");
            } catch (e) {
                showToast("수정 실패");
            }
        };

        // 댓글 삭제
        window.deleteComment = async (id) => {
            if (!confirm("정말 삭제하시겠습니까?")) return;
            try {
                await deleteDoc(doc(db, "news", currentNewsId, "comments", id));
                showToast("삭제되었습니다.");
            } catch (e) {
                showToast("삭제 실패");
            }
        };

        // 대댓글 폼 토글
        window.toggleReplyForm = (id) => {
            if (!auth.currentUser) return showToast("로그인 후 이용 가능합니다.");
            const form = document.getElementById(`reply-form-${id}`);
            form.classList.toggle('active');
            if (form.classList.contains('active')) {
                document.getElementById(`reply-input-${id}`).focus();
            }
        };

        // 좋아요/싫어요 핸들러
        window.handleReaction = async (id, type) => {
            if (!auth.currentUser) return showToast("로그인 후 참여 가능합니다.");
            
            // 단순화를 위해 세션 스토리지에 반응 여부 저장 (새로고침 전까지 유지)
            const storageKey = `reacted_${id}_${auth.currentUser.uid}`;
            if (sessionStorage.getItem(storageKey)) {
                return showToast("이미 참여하셨습니다.");
            }

            try {
                const commentRef = doc(db, "news", currentNewsId, "comments", id);
                await updateDoc(commentRef, {
                    [type]: increment(1)
                });
                sessionStorage.setItem(storageKey, 'true');
                showToast(type === 'likes' ? "좋아요를 눌렀습니다." : "싫어요를 눌렀습니다.");
            } catch (e) {
                showToast("처리 중 오류 발생");
            }
        };

        // 신고 기능
        window.reportComment = (id) => {
            if (!auth.currentUser) return showToast("로그인 후 신고가 가능합니다.");
            if (confirm("이 댓글을 신고하시겠습니까? 운영진이 검토 후 조치합니다.")) {
                showToast("신고가 접수되었습니다. 감사합니다.");
                // 실제 운영 시에는 'reports' 컬렉션에 추가하는 로직을 넣을 수 있습니다.
            }
        };

        // 인증 처리
        onAuthStateChanged(auth, (user) => {
            const authContainer = document.getElementById('authContainer');
            if (user) {
                authContainer.innerHTML = `
                    <div class="user-profile" id="userProfile" title="로그아웃">
                        <span class="user-name" style="font-size:13px; font-weight:bold;">${user.displayName}님</span>
                        <img src="${user.photoURL}" class="user-photo" alt="profile">
                    </div>
                `;
                document.getElementById('userProfile').onclick = () => {
                    if(confirm("로그아웃 하시겠습니까?")) signOut(auth);
                };
            } else {
                authContainer.innerHTML = `<button class="login-btn" id="loginBtn">로그인</button>`;
                document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        window.loadNews();
    </script>

    <script>
        function initDate() {
            const dateEl = document.getElementById('realTimeDate');
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            dateEl.innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
        }

        async function getWeather() {
            const API_KEY = 'f9588dfba7000b48e2a636ba0ded59c5';
            const weatherEl = document.getElementById('weatherDisplay');
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Seoul&appid=${API_KEY}&units=metric&lang=kr`);
                const data = await res.json();
                weatherEl.innerHTML = `<img src="https://openweathermap.org/img/wn/${data.weather[0].icon}.png" class="weather-icon"> <span>${Math.round(data.main.temp)}°C ${data.name}</span>`;
            } catch (e) { weatherEl.innerText = "날씨 정보 없음"; }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        window.addEventListener('load', () => { initDate(); getWeather(); });
    </script>
</body>
</html>
