<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조이고 뉴스 - JoyGO News</title>
    <style>
        /* 기본 설정 및 폰트 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        :root {
            --joygo-blue: #6166fb;
            --bg-light: #f4f6f9;
            --text-main: #1a1a1a;
            --text-muted: #999;
            --border: #e1e4e8;
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            color: var(--text-main);
            background-color: #fff;
            line-height: 1.5;
        }

        ul { margin: 0; padding: 0; list-style: none; }
        a { text-decoration: none; color: inherit; }

        /* 최상단 장식 바 */
        .top-accent-bar {
            height: 10px;
            background-color: var(--joygo-blue);
            width: 100%;
        }

        /* 헤더 섹션 */
        header {
            padding: 20px 10%;
            border-bottom: 1px solid var(--border);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo img {
            height: 45px;
            display: block;
        }

        /* 속보 티커 */
        .breaking-news {
            flex: 1;
            margin: 0 40px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #333;
        }
        .breaking-news span {
            color: #ff0000;
            margin-right: 10px;
        }

        /* 헤더 우측 도구 */
        .header-tools {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .date-display {
            font-size: 13px;
            font-weight: bold;
            color: #444;
        }

        .weather-display {
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .weather-icon {
            width: 24px;
            height: 24px;
        }
        .loc-btn {
            background: #f0f2f5;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 11px;
            padding: 2px 5px;
            cursor: pointer;
            margin-left: 5px;
        }

        /* 로그인 섹션 스타일 */
        .auth-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .login-btn {
            background-color: var(--joygo-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .user-photo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
        }
        .user-name {
            font-size: 13px;
            font-weight: bold;
        }

        /* 네비게이션 */
        nav ul {
            display: flex;
            gap: 30px;
        }

        nav ul li a {
            font-size: 17px;
            font-weight: 800;
            padding-bottom: 8px;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }

        nav ul li a.active, nav ul li a:hover {
            color: var(--joygo-blue);
            border-bottom-color: var(--joygo-blue);
        }

        /* 메인 컨텐츠 */
        main {
            padding: 40px 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 30px;
            border-left: 6px solid var(--joygo-blue);
            padding-left: 15px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .news-item {
            border: 1px solid #eee;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            background: white;
            display: flex;
            flex-direction: column;
        }
        .news-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .news-content-area {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .news-content-area h3 { margin: 0 0 10px 0; font-size: 18px; }
        .news-content-area p { font-size: 14px; color: #555; margin-bottom: 15px; flex-grow: 1; }
        
        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
            font-size: 12px;
            color: #888;
        }
        .report-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* 토스트 알림 */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            font-size: 13px;
            display: none;
        }

        @media (max-width: 1024px) {
            .news-grid { grid-template-columns: 1fr; }
            .header-main { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="top-accent-bar"></div>

    <header>
        <div class="header-main">
            <div class="logo">
                <a href="#"><img src="https://i.postimg.cc/PrK5Ysh4/joygo-logo-qenyzfo8a6cul319bqetl2et0yfhgwizrrfan2szcw.png" alt="JoyGO News Logo"></a>
            </div>
            
            <div class="breaking-news" id="newsTicker">
                <span>[속보]</span> 시민들이 직접 만드는 뉴스 플랫폼 '조이고 뉴스' 정식 오픈!
            </div>

            <div class="header-tools">
                <div class="info-wrap">
                    <div class="date-display" id="realTimeDate"></div>
                    <div class="weather-display">
                        <div id="weatherDisplay">로딩 중...</div>
                        <button class="loc-btn" onclick="getCurrentLocation()">📍 내 위치</button>
                    </div>
                </div>
                
                <!-- 로그인 섹션 -->
                <div class="auth-container" id="authContainer">
                    <button class="login-btn" id="loginBtn">로그인</button>
                </div>
            </div>
        </div>

        <nav>
            <ul>
                <li><a href="#" class="active">홈</a></li>
                <li><a href="#">실시간</a></li>
                <li><a href="#">뉴스</a></li>
                <li><a href="#">시사교양</a></li>
                <li><a href="https://www.joygonews.uk/jebo" target="_blank">제보</a></li>
                <li><a href="#">UN</a></li>
                <li><a href="https://www.joygonews.uk/weather">날씨</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2 class="section-header">최신 뉴스 피드</h2>
            <div class="news-grid" id="newsGrid">
                <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">
                    뉴스를 불러오고 있습니다...
                </div>
            </div>
        </section>
    </main>

    <div id="toast"></div>

    <!-- Firebase SDK 로드 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDOu8jfgNproVHenknRdsG-HPScyFMdO0k",
            authDomain: "joygonews318.firebaseapp.com",
            projectId: "joygonews318",
            storageBucket: "joygonews318.firebasestorage.app",
            messagingSenderId: "18066193272",
            appId: "1:18066193272:web:8a5e0e8e8a82d3e870e68d",
            measurementId: "G-YGPH1T655Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const authContainer = document.getElementById('authContainer');

        window.loadNews = async () => {
            const newsGrid = document.getElementById('newsGrid');
            try {
                const q = query(collection(db, "news"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    newsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">등록된 뉴스가 없습니다. 첫 뉴스를 제보해보세요!</div>';
                    return;
                }

                newsGrid.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : '방금 전';
                    
                    newsGrid.innerHTML += `
                        <article class="news-item">
                            <div class="video-wrapper">
                                <iframe src="https://www.youtube.com/embed/${data.youtubeId}" frameborder="0" allowfullscreen></iframe>
                            </div>
                            <div class="news-content-area">
                                <h3>${data.title}</h3>
                                <p>${data.content}</p>
                                <div class="news-footer">
                                    <div>
                                        <strong>${data.author || '익명'}</strong> · ${date}
                                    </div>
                                    <button class="report-btn" onclick="window.reportNews('${doc.id}')">
                                        🚩 신고
                                    </button>
                                </div>
                            </div>
                        </article>
                    `;
                });
            } catch (e) {
                console.error("Error loading news:", e);
                newsGrid.innerHTML = '<div style="color:red; text-align:center; grid-column:1/-1;">뉴스를 불러오는 중 오류가 발생했습니다.</div>';
            }
        };

        window.reportNews = async (newsId) => {
            if (!auth.currentUser) return showToast("로그인 후 신고해주세요.");
            if (!confirm("이 게시물을 부적절한 콘텐츠로 신고하시겠습니까?")) return;

            try {
                await addDoc(collection(db, "reports"), {
                    newsId: newsId,
                    reporterUid: auth.currentUser.uid,
                    reporterEmail: auth.currentUser.email,
                    timestamp: serverTimestamp()
                });
                showToast("신고가 접수되었습니다. 감사합니다.");
            } catch (e) {
                showToast("신고 처리 중 오류가 발생했습니다.");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authContainer.innerHTML = `
                    <div class="user-profile" id="userProfile" title="로그아웃">
                        <span class="user-name">${user.displayName}님</span>
                        <img src="${user.photoURL}" class="user-photo" alt="profile">
                    </div>
                `;
                document.getElementById('userProfile').onclick = () => {
                    if(confirm("로그아웃 하시겠습니까?")) signOut(auth);
                };
            } else {
                authContainer.innerHTML = `<button class="login-btn" id="loginBtn">로그인</button>`;
                document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        window.loadNews();
    </script>

    <script>
        const WEATHER_API_KEY = 'f9588dfba7000b48e2a636ba0ded59c5';

        function initDate() {
            const dateEl = document.getElementById('realTimeDate');
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            dateEl.innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
        }

        function renderWeather(data) {
            const weatherEl = document.getElementById('weatherDisplay');
            const temp = Math.round(data.main.temp);
            const desc = data.weather[0].description;
            const cityName = data.name;
            const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}.png`;
            weatherEl.innerHTML = `
                <span style="font-weight:bold">${cityName}</span>
                <img src="${iconUrl}" class="weather-icon" alt="${desc}">
                <span>${temp}°C</span>
            `;
        }

        async function getWeatherByCity(city) {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`);
                const data = await response.json();
                renderWeather(data);
            } catch (err) { console.error(err); }
        }

        async function getWeatherByCoords(lat, lon) {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`);
                const data = await response.json();
                renderWeather(data);
            } catch (err) { console.error(err); }
        }

        function getCurrentLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                (pos) => getWeatherByCoords(pos.coords.latitude, pos.coords.longitude),
                () => getWeatherByCity('Seoul')
            );
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        window.onload = () => {
            initDate();
            getWeatherByCity('Seoul');
        };
    </script>
</body>
</html>
