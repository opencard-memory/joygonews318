<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 제보하기 - 조이고 뉴스</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        :root { --joygo-blue: #6166fb; --border: #e1e4e8; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f4f6f9; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .report-card { background: white; width: 90%; max-width: 500px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 30px; cursor: pointer; }
        .logo img { height: 40px; }
        
        h2 { text-align: center; font-weight: 900; margin-bottom: 30px; color: #333; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #555; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; outline: none; transition: border 0.2s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--joygo-blue); }
        
        .submit-btn { width: 100%; background: var(--joygo-blue); color: white; border: none; padding: 18px; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .back-link { text-align: center; margin-top: 20px; font-size: 14px; color: #888; cursor: pointer; }
        
        /* 로딩 마스크 */
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading">
        <p>사용자 정보를 확인 중입니다...</p>
    </div>

    <div class="report-card">
        <div class="logo" onclick="location.href='index.html'">
            <img src="https://i.postimg.cc/PrK5Ysh4/joygo-logo-qenyzfo8a6cul319bqetl2et0yfhgwizrrfan2szcw.png" alt="Logo">
        </div>
        <h2>뉴스 제보하기</h2>
        
        <div class="input-group">
            <label>뉴스 제목</label>
            <input type="text" id="newsTitle" placeholder="시선을 사로잡는 제목">
        </div>
        <div class="input-group">
            <label>유튜브 영상 링크</label>
            <input type="text" id="newsYoutube" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        <div class="input-group">
            <label>제보 내용</label>
            <textarea id="newsContent" rows="5" placeholder="상세한 내용을 적어주세요"></textarea>
        </div>
        
        <button class="submit-btn" id="submitBtn">제보 완료하기</button>
        <div class="back-link" onclick="location.href='index.html'">돌아가기</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDOu8jfgNproVHenknRdsG-HPScyFMdO0k",
            authDomain: "joygonews318.firebaseapp.com",
            projectId: "joygonews318",
            storageBucket: "joygonews318.firebasestorage.app",
            messagingSenderId: "18066193272",
            appId: "1:18066193272:web:8a5e0e8e8a82d3e870e68d",
            measurementId: "G-YGPH1T655Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 현재 로그인한 사용자의 닉네임을 담을 변수
        let currentUserNickname = "";

        // 1. 보안 체크 및 닉네임 미리 가져오기
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                alert("로그인이 필요한 페이지입니다. 메인으로 이동합니다.");
                location.href = "index.html"; 
            } else {
                try {
                    // 유저 컬렉션에서 닉네임 조회
                    const userDocRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userDocRef);
                    
                    if (userSnap.exists()) {
                        currentUserNickname = userSnap.data().nickname;
                    } else {
                        // 닉네임 설정이 안 되어있다면 구글 이름이라도 사용
                        currentUserNickname = user.displayName || "익명 제보자";
                    }
                    
                    document.getElementById('loading').style.display = 'none'; 
                } catch (e) {
                    console.error("사용자 정보 로드 실패:", e);
                    currentUserNickname = user.displayName || "익명 제보자";
                    document.getElementById('loading').style.display = 'none';
                }
            }
        });

        // 2. 유튜브 ID 추출 함수
        function getYoutubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // 3. 제보 버튼 클릭 이벤트
        document.getElementById('submitBtn').onclick = async () => {
            const title = document.getElementById('newsTitle').value.trim();
            const url = document.getElementById('newsYoutube').value.trim();
            const content = document.getElementById('newsContent').value.trim();
            const videoId = getYoutubeID(url);
            const btn = document.getElementById('submitBtn');

            if (!title || !videoId || !content) {
                alert("모든 빈칸을 채워주세요! 유튜브 링크가 올바른지도 확인해 주세요.");
                return;
            }

            // 버튼 중복 클릭 방지
            btn.disabled = true;
            btn.innerText = "업로드 중...";

            try {
                // 기사 데이터를 news 컬렉션에 추가
                await addDoc(collection(db, "news"), {
                    title: title,
                    youtubeId: videoId,
                    content: content,
                    author: currentUserNickname, // <--- 여기서 저장된 닉네임을 사용!
                    authorUid: auth.currentUser.uid,
                    views: 0, // 초기 조회수 0
                    createdAt: serverTimestamp()
                });
                
                alert("제보가 성공적으로 완료되었습니다!");
                location.href = "index.html"; 
            } catch (e) {
                console.error("제보 오류:", e);
                alert("제보 중 오류가 발생했습니다. 다시 시도해 주세요.");
                btn.disabled = false;
                btn.innerText = "제보 완료하기";
            }
        };
    </script>
</body>
</html>
